---
# Install Firefox from Mozilla's official APT repo instead of snap.
# This enables native messaging for 1Password browser integration.

- name: Remove Firefox snap
  become: true
  community.general.snap:
    name: firefox
    state: absent
  ignore_errors: true

- name: Add Mozilla APT signing key
  become: true
  ansible.builtin.shell:
    cmd: wget -q https://packages.mozilla.org/apt/repo-signing-key.gpg -O- | tee /etc/apt/keyrings/packages.mozilla.org.asc > /dev/null
    creates: /etc/apt/keyrings/packages.mozilla.org.asc

- name: Add Mozilla APT repository
  become: true
  ansible.builtin.copy:
    content: "deb [signed-by=/etc/apt/keyrings/packages.mozilla.org.asc] https://packages.mozilla.org/apt mozilla main\n"
    dest: /etc/apt/sources.list.d/mozilla.list
    mode: "0644"

# Ubuntu's firefox deb is a shim that redirects to snap. Its epoch
# version (1:1snap1-*) sorts higher than Mozilla's real version, so a
# simple priority boost isn't enough — we must also pin the Ubuntu
# package to -1 (never install) to prevent apt upgrade from pulling
# the shim back in.
- name: Pin Mozilla repo and block Ubuntu snap shim
  become: true
  ansible.builtin.copy:
    content: |
      Package: firefox*
      Pin: release o=packages.mozilla.org
      Pin-Priority: 1000

      Package: firefox*
      Pin: release o=Ubuntu
      Pin-Priority: -1
    dest: /etc/apt/preferences.d/mozilla
    mode: "0644"

- name: Remove Ubuntu Firefox snap shim deb
  become: true
  ansible.builtin.apt:
    name: firefox
    state: absent

- name: Install Firefox from Mozilla APT repo
  become: true
  ansible.builtin.apt:
    name: firefox
    state: latest
    update_cache: true
    allow_downgrade: true
