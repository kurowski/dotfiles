[packages."tag:desktop.tag:fedora".flatpak]
all = ["md.obsidian.Obsidian"]

[packages."tag:desktop.tag:ubuntu".flatpak]
all = ["md.obsidian.Obsidian"]

[packages."tag:server"]
fedora = ["openssh-server"]
ubuntu = ["openssh-server"]

[packages."tag:gnome"]
ubuntu = [
  "gnome-browser-connector",
  "gnome-shell-extension-manager",
  "gnome-tweaks",
]

[packages."tag:personal"]
fedora = [
  "firefox",
  "mpv",
  "rclone",
  "seadrive-gui",
  "steam",
  "tailscale",
  "yt-dlp",
]
# Firefox on Ubuntu is installed in pre-02-ubuntu-repos.sh to handle
# apt pinning + the snap-shim downgrade.
ubuntu = [
  "tailscale",
]

[packages."tag:ubuntu".snap]
all = ["aws-cli/classic"]

[packages."tag:personal.tag:desktop.tag:ubuntu".snap]
all = ["gimp", "spotify"]

# Source-only zsh plugins, vendored without a plugin manager and sourced
# from .zshrc. homie clones them on first apply, fast-forwards on later
# applies. Add `ref = "vX.Y.Z"` to freeze one on a long-lived host.
[externals."~/.zsh/plugins/zsh-autosuggestions"]
repo = "https://github.com/zsh-users/zsh-autosuggestions"

[externals."~/.zsh/plugins/fzf-tab"]
repo = "https://github.com/Aloxaf/fzf-tab"

[tags]
extra = []

[vars]
EDITOR = "nvim"
# Appearance default for untagged hosts and anonymous devcontainers (work/light).
# Personal hosts override this to "dark".
THEME  = "light"
